$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/AI-native-Systems-Research/agentic-strategy-evolution/schemas/experiment_plan.schema.yaml"
title: Experiment Plan
description: >
  Exact shell commands to execute for each hypothesis arm.
  Produced by the executor during EXECUTE_ANALYZE.
type: object
required: [metadata, arms]
additionalProperties: false
properties:
  metadata:
    type: object
    required: [iteration, bundle_ref]
    properties:
      iteration:
        type: integer
        minimum: 1
      bundle_ref:
        type: string
        minLength: 1
      description:
        type: string
  setup:
    type: array
    items:
      type: object
      required: [cmd]
      additionalProperties: false
      properties:
        cmd:
          type: string
          minLength: 1
        description:
          type: string
  arms:
    type: array
    minItems: 1
    items:
      type: object
      required: [arm_id, conditions]
      additionalProperties: false
      properties:
        arm_id:
          type: string
          minLength: 1
        conditions:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, cmd]
            additionalProperties: false
            properties:
              name:
                type: string
                minLength: 1
              cmd:
                type: string
                minLength: 1
              output:
                type: string
              inputs:
                type: array
                items:
                  type: string
              description:
                type: string
