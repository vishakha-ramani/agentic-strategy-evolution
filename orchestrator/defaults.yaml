# Nous Default Configuration
#
# Per-phase model defaults. Override in campaign.yaml under `models:`.
# Model names depend on your LLM backend (LiteLLM, OpenAI, Bedrock, etc.).
#
# Examples:
#   LiteLLM proxy:    claude-sonnet-4-6, aws/claude-haiku-4-5
#   OpenAI direct:    gpt-4o, gpt-4o-mini
#   Anthropic direct: claude-sonnet-4-5-20250514, claude-haiku-4-5-20251001
#   Claude CLI:       sonnet, haiku, opus

models:
  # DESIGN — explores repo via claude -p, frames problem, designs hypothesis bundle.
  # Uses Opus for better regime validation, parameter selection, and hypothesis quality.
  design: "claude-opus-4-6"

  # EXECUTE_ANALYZE — builds, patches, runs experiments, analyzes results, extracts principles.
  # All in one session with full context.
  execute_analyze: "claude-sonnet-4-6"

  # REPORT — generates final report.md at campaign end.
  report: "claude-sonnet-4-6"

# Max tool-use turns for claude -p phases.
max_turns:
  design: 150
  execute_analyze: 120
